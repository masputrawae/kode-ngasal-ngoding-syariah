<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Background</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="u-centering">
    <div class="u-centering u-shadow box">

        <div class="u-centering u-shadow box__display box__display--history">
            <ul id="historyColor"></ul>
        </div>

        <div class="u-centering box__display">
            <h1 class="box__title">Background</h1>
            <strong class="u-shadow box__text box__text--name" id="nameColor"></strong>
            <code class="u-shadow box__text box__text--hex" id="nameHex"></code>
        </div>

        <div class="u-centering box__control">
            <button class="u-shadow button" data-button="resetColor">Clear</button>
            <button class="u-shadow button" data-button="shuffleColor">Shuffle</button>
        </div>

    </div>
    <script src="./script.js"></script>
</body>
</html>
