<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            .card {
                width: 300px;
                border: 1px solid #ccc;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                font-family: sans-serif;
            }

            .card-image {
                width: 100%;
                height: auto;
                display: block;
            }

            .card-content {
                padding: 16px;
            }

            .card-title {
                font-size: 1.25rem;
                margin: 0 0 8px;
            }

            .card-description {
                font-size: 0.95rem;
                margin: 0 0 16px;
            }

            .card-button {
                display: inline-block;
                padding: 8px 12px;
                background-color: #007bff;
                color: white;
                text-decoration: none;
                border-radius: 6px;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script src="./main.js"></script>
    </body>
</html>
